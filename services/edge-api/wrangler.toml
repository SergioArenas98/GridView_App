# GridView edge API - Cloudflare Worker configuration.
#
# Local development only for now: no Cloudflare account resources
# (KV namespaces, R2 buckets, routes, domains, secrets) are provisioned yet.
# Bindings are added in Phase 5 (backend foundation) of
# docs/technical/GridView_Implementation_Plan.md.

name = "gridview-api-dev"
main = "src/index.ts"
compatibility_date = "2026-07-01"

[vars]
ENVIRONMENT = "development"

[env.staging]
name = "gridview-api-staging"
workers_dev = true
preview_urls = false

[env.staging.vars]
ENVIRONMENT = "staging"
PROVIDER_MODE = "mock"
PUBLIC_BASE_URL = "https://gridview-api-staging.sejuma18.workers.dev"

[env.staging.secrets]
required = ["ADMIN_TOKEN"]

[[env.staging.kv_namespaces]]
binding = "GRIDVIEW_DATA"
id = "1d0fb55486a745a1ad12e03d9f04942b"

[env.staging.triggers]
crons = ["17 3 * * *"]

[env.staging.observability]
enabled = true
head_sampling_rate = 1

[env.staging.observability.logs]
enabled = true
persist = true
invocation_logs = false

[env.production]
name = "gridview-api-production"

[env.production.vars]
ENVIRONMENT = "production"
PROVIDER_MODE = "none"
