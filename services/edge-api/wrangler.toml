# GridView edge API - Cloudflare Worker configuration.
#
# Local development only for now: no Cloudflare account resources
# (KV namespaces, R2 buckets, routes, domains, secrets) are provisioned yet.
# Bindings are added in Phase 5 (backend foundation) of
# docs/technical/GridView_Implementation_Plan.md.

name = "gridview-api-dev"
main = "src/index.ts"
compatibility_date = "2026-07-01"

[vars]
ENVIRONMENT = "development"

# Future bindings (Phase 5) - do not enable without provisioning approval:
# [[kv_namespaces]]
# binding = "GRIDVIEW_DATA"
# id = "<provisioned KV namespace id>"
#
# [[r2_buckets]]
# binding = "GRIDVIEW_MEDIA"
# bucket_name = "gridview-media-staging"

[env.staging]
name = "gridview-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[env.production]
name = "gridview-api-production"

[env.production.vars]
ENVIRONMENT = "production"
