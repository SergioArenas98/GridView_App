name: gridview
description: "GridView - a Formula 1 season companion for Android."
publish_to: "none"

# Google Play identity: versionName 1.2.1, versionCode 7.
# Do not change without confirming the highest published versionCode in
# Play Console first (docs/release/play-store-baseline.md).
version: 1.2.1+7

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  go_router: ^17.3.0
  # State management (TRD §9). Manual providers — no riverpod codegen.
  flutter_riverpod: ^3.0.0
  # HTTP client for the remote GridView API boundary (TRD §13).
  dio: ^5.7.0
  # Offline-first local persistence (TRD §15).
  drift: 2.34.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0
  # IANA timezone conversion for DST-correct event-local session times
  # (TRD §11.4 / Domain Model §5.3). Time zones are never inferred from country.
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^3.2.0
  json_serializable: ^6.9.0
  drift_dev: 2.34.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    # Dev/staging-only fixture snapshots served by the injected fixture API.
    # OpenAPI-valid; never used in production builds (see FixtureGridViewApi).
    - assets/dev_fixtures/
