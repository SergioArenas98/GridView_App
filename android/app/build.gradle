import java.util.Properties
import java.io.FileInputStream

plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

// google-services.json is registered for the production application ID only
// (com.sejuma.gridview), so the Google services plugin is applied exclusively
// to production builds. Applying it to dev/staging would fail the build and
// could point non-production builds at the production Firebase project.
// Dev/staging Firebase configurations are pending; see
// docs/technical/GridView_Environments.md.
if (gradle.startParameter.taskRequests.toString().toLowerCase().contains("production")) {
    apply plugin: "com.google.gms.google-services"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.sejuma.gridview"
    compileSdk 36
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId "com.sejuma.gridview"
        minSdk flutter.minSdkVersion
        targetSdk 36
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    buildFeatures {
        buildConfig true
    }

    flavorDimensions = ["environment"]

    productFlavors {
        dev {
            dimension "environment"
            applicationIdSuffix ".dev"
            versionNameSuffix "-dev"
            resValue "string", "app_name", "GridView Dev"
        }
        staging {
            dimension "environment"
            applicationIdSuffix ".staging"
            versionNameSuffix "-staging"
            resValue "string", "app_name", "GridView Staging"
        }
        production {
            dimension "environment"
            resValue "string", "app_name", "GridView"
        }
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source "../.."
}
