name: CI

on:
  pull_request:
  push:
    branches: [master]

# No private secrets and no production infrastructure are used in CI.
# The Android build is a debug artifact with standard debug signing.

jobs:
  flutter:
    name: Flutter quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned Flutter version from .fvmrc
        id: fvm
        run: echo "version=$(jq -r .flutter .fvmrc)" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated localizations are current
        run: |
          flutter gen-l10n
          git diff --exit-code

      - name: Verify generated code is current
        run: |
          dart run build_runner build
          git diff --exit-code

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build dev debug APK
        run: flutter build apk --debug --flavor dev --dart-define=APP_ENV=development

  edge-api:
    name: Edge API quality gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/edge-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/edge-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format

      - name: Run tests
        run: npm test

      - name: Validate contract (OpenAPI, curated content, API fixtures)
        run: npm run validate

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
